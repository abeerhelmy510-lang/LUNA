<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA - المساعدة الذكية</title>
    <style>
        :root { --glow: #00f2fe; --dark: #0d1117; --accent: #4facfe; }
        body { background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; }

        /* الأيقونة العائمة */
        #luna-btn {
            position: fixed; bottom: 25px; right: 25px; width: 70px; height: 70px;
            background: linear-gradient(45deg, var(--glow), var(--accent));
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 35px; cursor: pointer; box-shadow: 0 0 20px var(--glow); z-index: 9999;
        }

        /* نافذة الدردشة */
        .window {
            position: fixed; bottom: 110px; right: 25px; width: 350px; height: 500px;
            background: #161b22; border-radius: 20px; display: none; flex-direction: column;
            border: 1px solid #30363d; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 9998;
        }

        .header { padding: 15px; background: #21262d; color: white; display: flex; justify-content: space-between; border-radius: 20px 20px 0 0; }
        .chat { flex: 1; padding: 15px; overflow-y: auto; color: white; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .bot { background: #30363d; align-self: flex-start; }
        .user { background: #1f6feb; align-self: flex-end; }
        
        .footer { padding: 10px; display: flex; gap: 5px; background: #0d1117; border-radius: 0 0 20px 20px; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #161b22; color: white; outline: none; }
        button { background: #238636; color: white; border: none; border-radius: 10px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="luna-btn" onclick="toggle()">🤖</div>

    <div id="win" class="window">
        <div class="header"><span>LUNA AI ✨</span><span onclick="toggle()" style="cursor:pointer">✖</span></div>
        <div id="box" class="chat"><div class="msg bot">أهلاً يا عبير! أنا لونا.. قوليلي أي حاجة وأنا هرد عليكي فوراً وبالصوت.</div></div>
        <div class="footer">
            <input type="text" id="in" placeholder="اكتبي هنا...">
            <button onclick="chat()">🚀</button>
        </div>
    </div>

    <script>
        // هنا حطيت المفتاح بتاعك اللي بعتيهولي عشان ميسألش تاني
        const API_KEY = "AIzaSyA2glGeNRIzxJPM3rN8DRRrYDC8NZD53fg";

        function toggle() {
            const w = document.getElementById('win');
            w.style.display = (w.style.display === 'none' || w.style.display === '') ? 'flex' : 'none';
        }

        async function chat() {
            const input = document.getElementById('in');
            const txt = input.value.trim();
            if(!txt) return;

            addMsg(txt, 'user');
            input.value = "";
            const wait = addMsg("بفكر...", 'bot');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                wait.innerText = reply;
                speak(reply);
            } catch (e) {
                wait.innerText = "لسه فيه مشكلة في الاتصال.. اتأكدي إن النت شغال.";
            }
        }

        function addMsg(t, type) {
            const b = document.getElementById('box');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = t;
            b.appendChild(d);
            b.scrollTop = b.scrollHeight;
            return d;
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t.replace(/[*#]/g, ''));
            u.lang = 'ar-SA';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
